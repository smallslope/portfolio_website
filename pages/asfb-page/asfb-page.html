<template id="asfb-page-template">
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="./pages/asfb-page/asfb-page.css ">
    <div class="asfb-page-container">
        <project-card mode="disabled" cta-link="#" type="project-page">
            <img slot="media" src="../../assets/imgs/asfb/asfb-1-min.png">
            <h4 slot="heading">A Synonym for Break</h4>
            <h1 slot="title">Building a Graduate Exhibition Website</h1>
            <span class="txt-bold" slot="dates">May 2024</span>
            <span slot="tag-name">Web Design/ Web Development/Project Management</span>
            <p slot="description">
                “A Synonym for Break” was the 2024 graduate exhibition for my BA Design course. I took the lead in designing and developing the exhibition website, creating a platform to both showcase student work and share information about the physical exhibition.
            </p>
            <span slot="cta">Website no longer live</span>
        </project-card>
        <section-heading class="body-large txt-bold txt-underlined section-heading-margin">
            <h3 slot="text">Project Management</h3>
        </section-heading>
        <text-block variant="default">
            <p slot="body">
                The project management aspect involved liaising with the stakeholders of the project including my fellow students, tutors and exhibition coordinator to ensure that all requirements were being met. I assembled a small team to help with the content management and development of the project. The website would host the work of approximately 80 students so I gathered around 6-8 people to help with the content management. This involved collecting the descriptions and media content from all of the students, checking for spelling and grammatical errors, checking image formatting and writing compelling alt-text for all media content. I wrote a simple brief for each task to ensure consistency and created spreadsheets which the team could use to manage and track the content.
            </p>
        </text-block>
        <single-image>
            <img slot="image" src="../../assets/imgs/asfb/asfb-2-min.png">
        </single-image>
        <section-heading>
            <h3 slot="text">Design</h3>
        </section-heading>
        <text-block variant="default">
            <p slot="body">
                The designs for the interface were created using Figma. The visual style was inspired by the hardcopy catalogue which had already been designed. The idea was to match the visual style of the website as closely as possible to the catalogue to create consistency across the visual identity of the exhibition. I designed the website to be responsive so that it would be suitable for all screen sizes.
            </p>
        </text-block>
        <section-heading>
            <h3 slot="text">Development</h3>
        </section-heading>
        <text-block variant="default">
            <p slot="body">
                For the development I worked as the primary developer where I utilised HTML, CSS and JavaScript to build the website. There was one other developer who worked on the animation of the website. Over a two week period (where we were still finishing off our own personal projects) we managed to develop the website together.
            </p>
        </text-block>
        <single-image>
            <img slot="image" src="../../assets/imgs/asfb/asfb-3-min.png">
        </single-image>
        <section-heading>
            <h3 slot="text">Outcome</h3>
        </section-heading>
        <text-block variant="default">
            <p slot="body">
                The project was completed on schedule and was a resounding success! It was great to see my peers happily showing off their work on the website that I helped build.
            </p>
        </text-block>
        <section-heading>
            <h3 slot="text">Reflection</h3>
        </section-heading>
        <text-block variant="background-1">
            <p slot="body">
                If I were to work on this project again I would develop the project to be more accessible, following WCAG guidelines closely. For example using more descriptive HTML tags within the HTML file and placing more thought into keyboard interactions and focus indicators.
            </p>
        </text-block>
    </div>
</template>
