            <h4 slot="heading">London Parkive</h4>
            <h1 slot="title">Building an interactive map of London’s parks and open spaces</h1>
            <span slot="tag-name">Web Design/ Web Development/ Data Collection</span>
            <p slot="description">
                The London Parkive is an interactive map documenting the history and evolution of London's parks and open spaces which I researched, designed and developed as part of my final year project at university.
            </p>
            <span slot="cta">Access the London Parkive</span>
        </project-card>
        <project-nav></project-nav>
        <section-heading class="body-large txt-bold txt-underlined section-heading-margin">
            <h3 slot="text">What is the London Parkive?</h3>
        </section-heading>
        <text-block variant="default">
            <p slot="body">
                The London Parkive is an archive of London’s parks and open spaces which allows you to explore their histories and evolution. It takes the form of a website where the main page is an interactive map. By toggling between the three available view modes you view different colour coded information on the parks.
            </p>
        </text-block>
        <image-carousel>
            <img slot="image" src="../../assets/imgs/london-parkive/london-parkive/london-parkive-1-min.png">
            <img slot="image" src="../../assets/imgs/london-parkive/london-parkive/london-parkive-2-min.png">
            <img slot="image" src="../../assets/imgs/london-parkive/london-parkive/london-parkive-3-min.png">
            <img slot="image" src="../../assets/imgs/london-parkive/london-parkive/london-parkive-4-min.png">
        </image-carousel>
        <text-block variant="default">
            <p slot="body">
                Clicking on a park will open up a pop up that displays information on the park. Currently the information displayed includes the parks coordinates, its names (if it goes by more than one), it’s view mode classifications and a brief history.  
            </p>
        </text-block>
        <single-image>
            <img slot="image" src="../../assets/imgs/london-parkive/london-parkive/london-parkive-5-min.png">
        </single-image>
        <text-block variant="default">
            <p slot="body">
                As the project only lasted 9 months the London Parkive in its current form is limited. It only displays information on Southwark and the data depicted is focused on history. However, there is the potential for the project to be scaled up to include the whole of London, or even the whole country. Also different types of data could be displayed as well making it a versatile tool with lots of potential.
            </p>
        </text-block>
        <section-heading>
            <h3 slot="text">
                Context Report (Dissertation)
            </h3>
        </section-heading>
        <text-block variant="default">
            <p slot="body">
                As this was a university project, alongside the website I also wrote a context report (dissertation). This was written early on in the project while I was looking for inspiration, researching and experimenting on how to build the website. You can read the context report by clicking the button below.
            </p>
        </text-block>
        <div class="button-container">
            <button onclick="window.open('../../assets/pdfs/london-parkive/london_parkive_context_report.pdf', '_blank')">View context report →</button>
        </div>
        <section-heading>
            <h3 slot="text">
                Background
            </h3>
        </section-heading>
        <text-block variant="default">
            <p slot="body">
                The project stemmed from a personal desire to understand what the situation is regarding London’s parks. In my first year of university I discovered a park that was being considered as a site for a building development project. The park was a charming, green haven tucked away in a quiet residential area of Lewisham and I was shocked because it had never occurred to me that parks in London could be under threat, after all aren’t they well protected? 
                <br><br>
                <span class="txt-bold">“I wonder how many parks have been developed on or shrank as a result of development?” </span>
                <br><br>
                was the first question that popped into my head. Despite finding some  interesting articles about under threat parks by charities like CPRE London I couldn’t find any comprehensive information to answer my question. So the idea for the London Parkive was born. A platform that could help consolidate and showcase the situation on London’s parks and open spaces.
            </p>
        </text-block>
        <single-image>
            <img slot="image" src="../../assets/imgs/london-parkive/parks-min.png">
        </single-image>
        <text-block variant="default">
            <p slot="body">
                The image on the left is Charlotte Turner Gardens, the park which first inspired this project. The image to the right depicts an example of a green space in a residential area which has been removed (commonly referred to as an “infill site” see Parkive V1 for more details on that.)
            </p>
        </text-block>
        <section-heading>
            <h3 slot="text">
                London Parkive V1
            </h3>
        </section-heading>
        <single-image>
            <img slot="image" src="../../assets/imgs/london-parkive/london-parkive-v1/london-parkive-v1-1-min.png">
        </single-image>
        <text-block variant="default">
            <p slot="body">
                In my first year of university I researched and built the first prototype of the Parkive over 6 weeks using Adobe XD. This version focused on Southwark and depicted the status of parks which were ‘Open’ (Green), ‘Defunct’ (Red) and ‘Under threat’ (Yellow). It also depicted what time period the park was opened in (the lighter the shade the newer the park). You can view the prototype by clicking the button below:
            </p>
        </text-block>
        <div class="button-container">
            <button>
                <a class="button-link" href="https://xd.adobe.com/view/3352df9c-4e92-45fa-9ad9-abd39440d89b-6601/screen/58b7da0c-1bc7-483c-a3a7-9d9793a55074/?fullscreen&hints=off" target="_blank">
                    View prototype →
                </a>
            </button>
        </div>

            <img slot="image" src="../../assets/imgs/london-parkive/london-parkive-v1/london-parkive-v1-2-min.png">

        <section-heading>
            <h3 slot="text">
                London Parkive V2
            </h3>
        </section-heading>
        <text-block variant="default">
            <p slot="body">
                In my final year at university, I had the opportunity to write my own brief and work on it for 8 months. So, in November 2023, I embarked on the journey of creating V2. 
            </p>
        </text-block>
        <text-block variant="background-1">
            <h4 slot="heading">London Parkive V2 Goals</h4>
            <ol slot="body">
                <li>
                    Turn the idea of the London Parkive into an actual functioning website.
                </li>
                <li>
                    Conduct more comprehensive research and data collection on parks and open spaces.
                </li>
                <li>
                    Expand the search radius further to include more areas of London (I didn’t pursue this goal in the end as I decided to focus on the quality of research over quantity).
                </li>
            </ol>
        </text-block>
        <section-heading>
            <h3 slot="text">
                Research
            </h3>
        </section-heading>
        <text-block variant="default">
            <p slot="body">
                Several methods were used for collecting the datasets on parks including: 
            </p>
        </text-block>
        <text-block variant="default">
            <h4 slot="heading">
                Visiting local archives and looking through lists of parks and open spaces
            </h4>
            <p slot="body">
                In local archives I was able to request all of their documents on parks and open spaces. They would usually come in boxes or folders and I could sift through them looking for official council documents that contain complete lists of parks and open spaces. They were often dated making it easy to find out exactly which parks existed in what time periods and often contained other useful information like the park’s address or opening date. (While it isn’t relevant to this particular project some lists also contained acquisition and maintenance costs which was interesting!). 
                <br><br>
                Below you can see some examples of these lists. 
            </p>
        </text-block>
        <single-image>
            <img slot="image" src="../../assets/imgs/london-parkive/research/research-1-min.png">
        </single-image>
        <text-block variant="default">
            <h4 slot="heading">
                Looking at digitised historical maps to confirm park closures, expansions and reductions
            </h4>
            <p slot="body">
                One particular website that came in very handy for this was the National Library of Scotland’s (NSL) website which has a tool for viewing and comparing digitised historic maps. The tool includes an option for viewing a current map and a digitised old map side by side. As the old maps were georeferenced it was easy to locate parks and see if and when a park has been opened, closed, expanded or shrunk. The image below shows how Nursery Row Park has been expanded compared with the old map on the left.  
            </p>
        </text-block>
        <single-image>
            <img slot="image" src="../../assets/imgs/london-parkive/research/research-2-min.png">
        </single-image>
        <text-block variant="default">
            <p slot="body">
                By utilising the NLS’s APIs, I was able to import the maps into geoJSON.io, a website that allows you to draw shapes on a map and store them in geoJSON format which can be used with JavaScript. This allowed the creation of the ‘Alterations view mode’ where you can view whether or not a parks boundaries have been expanded or shrunk over time. 
                <br><br>
                Below you can see an example of a park that has been expanded. The green colour shows the original boundaries and the blue shows the current boundaries.
            </p>
        </text-block>
        <single-image>
            <img slot="image" src="../../assets/imgs/london-parkive/research/research-3-min.png">
        </single-image>
        <text-block variant="default">
            <h4 slot="heading">
                Utilising existing websites
            </h4>
            <p slot="body">
                The Parkive is by no means the first website which hosts information on parks and open spaces. Below is a list of other existing websites I used to find out information on parks including their histories and general information. 
            </p>
        </text-block>
        <text-block variant="background-1">
            <ul slot="body">
                <li>
                    <a href="https://www.goparks.london/map/#xyz=14/51.50797/-0.12798" target="_blank" class="txt-bold">GoParks London</a> - A map based website that depicts general information on parks and open spaces around London. 
                </li>
                <li>
                    <a href="https://londongardenstrust.org/" target="_blank" class="txt-bold">London Garden Trust</a> - Shares information on parks and open spaces, including their history. I used this website extensively to find out the history of parks.
                </li>
                <li>
                    <a href="https://www.gigl.org.uk/" target="_blank" class="txt-bold">GiGL (Green space Information for Greater London)</a>  - Shares wildlife information on London’s parks and open spaces.
                </li>
                <li>
                    <span class="txt-bold">Council Websites</span> - All borough council websites have a section dedicated to parks and open spaces in the area
                </li>
            </ul>
        </text-block>
        <section-heading>
            <h3 slot="text">
                Date Collection & Management
            </h3>
        </section-heading>
        <text-block variant="default">
            <p slot="body">
                The collected datasets on the parks were organised onto a Notion spreadsheet to begin with. Datasets that were documented include:
            </p>
        </text-block>
        <text-block variant="background-2">
            <ul slot="body">
                <li>
                    Park name
                </li>
                <li>
                    Geographical coordinates 
                </li>
                <li>
                    The year the park was opened
                </li>
                <li>
                    Whether or not the park has been expanded or shrunk overtime
                </li>
                <li>
                    A brief history of the park (mostly taken from the London Garden Trust’s website)
                </li>
            </ul>
        </text-block>
        <text-block variant="default">
            <p slot="body">
                The Notion spreadsheet was then converted to CSV format, then to JSON format in order to add the datasets to the website. 
            </p>
        </text-block>
        <single-image>
            <img slot="image" src="../../assets/imgs/london-parkive/data-management-min.png">
        </single-image>
        <text-block variant="default">
            <h4 slot="heading">
                Park Input Form
            </h4>
            <p slot="body">
                An idea that was explored early on in the project was to create an input form that would allow a user to input park data directly into the website instead of importing a CSV file. Creating this functionality would allow the London Parkive to become a more scalable project and could open up the potential to community contributions. I designed an input form in Figma to explore this idea. However due to the tight timeline I was not able to fully flesh this idea out. 
            </p>
        </text-block>
        <single-image>
            <img slot="image" src="../../assets/imgs/london-parkive/input-form-min.png">
        </single-image>
        <section-heading>
            <h3 slot="text">
                Design
            </h3>
        </section-heading>
        <text-block variant="default">
            <h4 slot="heading">
                Aesthetics
            </h4>
            <p slot="body">
                The London Parkive has a simple aesthetic consisting of a monochrome base colour palette. In truth, the final look is based on the wireframes. When I showed my classmates and friends the wireframes, the overall consensus was that they liked how simple it looked because it made the colour coded datasets on the map stand out more and also made the website more user friendly. For this reason, and also to keep the development process as simple as possible, I stuck to this aesthetic.
            </p>
        </text-block>
        <single-image>
            <img slot="image" src="../../assets/imgs/london-parkive/style-guide-min.png">
        </single-image>
        <text-block variant="default">
            <h4 slot="heading">
                Wireframes
            </h4>
            <p slot="body">
                While I had initially been eager to practice my prototyping and mock up skills, the decision to stick to a simple aesthetic, paired with the desire to focus more time on development meant spending less time in Figma. The wireframes displayed below show some of the potential ideas for the Parkive which I would like to have explored further if I had more time to work on the project. 
            </p>
        </text-block>
        <image-carousel>
            <img slot="image" src="../../assets/imgs/london-parkive/wireframes/wireframes-1-min.png">
            <img slot="image" src="../../assets/imgs/london-parkive/wireframes/wireframes-2-min.png">
            <img slot="image" src="../../assets/imgs/london-parkive/wireframes/wireframes-3-min.png">
            <img slot="image" src="../../assets/imgs/london-parkive/wireframes/wireframes-4-min.png">
        </image-carousel>
        <section-heading>
            <h3 slot="text">
                Development
            </h3>
        </section-heading>
        <text-block variant="default">
            <p slot="body">
                As a fledgling developer, building the website was the most challenging aspect. This project has taken me on an expedition through the lands of APIs and JavaScript libraries. Along the way I have learned about CSVs, JSON, geoJSON and how to program for GIS (Geographical Information Systems). It has made me really appreciate the open source nature of programming where you can rely on what others before you have done to make the process of building something easier. For context at the start of this project I thought I would have to code most of the website using only vanilla JavaScript. 
            </p>
        </text-block>
        <text-block variant="default">
            <h4 slot="heading">
                Tech stack
            </h4>
            <p slot="body">
                The London Parkive uses a web-mapping tech stack that combines frontend web technologies with mapping libraries and geospatial data. Below is a summary of the various technologies that were used to build it. 
            </p>
        </text-block>
        <text-block variant="background-1">
            <ul slot="body">
                <li>
                   <span class="txt-bold">HTML/CSS/Javascript:</span> Front end web development
                </li>
                <li>
                    <span class="txt-bold">MapLibre JS:</span> Mapping/GIS library used to render and control the interactive map
                </li>
                <li>
                    <span class="txt-bold">Turf.js:</span> Used for geospatial calculations
                </li>
                <li>
                    <span class="txt-bold">GeoJSON:</span> Used to store and draw park boundaries and changes over time
                </li>
                <li>
                    <span class="txt-bold">CSV:</span> Used to convert spreadsheets into  JSON to feed park data into the site
                </li>
                <li>
                    <span class="txt-bold">Stamen tiles (OpenStreetMap):</span> Base map tiles used as the background layer for the interactive map
                </li>
            </ul>
        </text-block>
        <text-block variant="default">
            <h4 slot="heading">
                Challenges and Lessons Learned
            </h4>
            <p slot="body">
                Given this was my first major programming project, I encountered many challenges and many lessons were learned along the way including:
            </p>
        </text-block>
        <text-block variant="background-2">
            <h4 slot="heading">
                Working with structured data
            </h4>
            <p slot="body">
                This was my first experience working with structured data formats such as CSV, JSON and GeoJSON. Through this  I learned how efficiently large datasets can be stored and accessed within a web application. It also allowed me to create dynamic elements, such as map popups that display different information depending on the properties of each park. 
            </p>
        </text-block>
        <text-block variant="background-1">
            <h4 slot="heading">
                Debugging and Problem Solving
            </h4>
            <p slot="body">
                Debugging was one of the biggest challenges. Early on I relied on some external help, but over time I became more confident in troubleshooting issues independently. By using browser developer tools and setting breakpoints, I improved my ability to trace problems in the code and understand where things were going wrong. 
            </p>
        </text-block>
        <text-block variant="background-2">
            <h4 slot="heading">
                Learning when to simplify
            </h4>
            <p slot="body">
                I learned that there are often multiple ways to achieve the same outcome in programming and that more complex solutions are not always the most effective. For example, while building the dropdown menus on the table page, I initially tried to dynamically generate their content. However, adding functionality to dynamically generated elements became overly complex within the project’s timeframe. After spending several weeks on this approach, I decided to simplify the solution by manually inputting the data. This allowed me to implement the required functionality much more quickly and complete the feature within a day. 
            </p>
        </text-block>

            <h4 slot="heading">
                Build Log
            </h4>
            <p slot="body">
                If you are interested in reading about the development process in more depth, alongside reflections and a few emotional tantrums feel free to read read the build log by clicking the link below!
            </p>
